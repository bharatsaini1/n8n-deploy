services:
  - type: web
    name: n8n
    runtime: docker
    image:
      url: n8nio/n8n:latest
    plan: free
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: dpg-d8ju64uk1jcs73e6nas0-a
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: n8n_ehpw
      - key: DB_POSTGRESDB_USER
        value: n8n_ehpw_user
      - key: DB_POSTGRESDB_PASSWORD
        value: OeCknTO4FqiQRqeI7ieK1OXa9vGNGlE1
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_PROTOCOL
        value: https
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
